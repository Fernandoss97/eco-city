services:
  postgres:
    image: postgres:16-alpine
    container_name: eco_city_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-eco_city}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-eco_city}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
